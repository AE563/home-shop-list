name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────── Python ───────────────────────────
  python:
    name: Python — lint & test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint — ruff check
        run: ruff check apps/ tests/

      - name: Lint — ruff format
        run: ruff format --check apps/ tests/

      - name: Django system check
        env:
          SECRET_KEY: ci-secret-key-not-used-in-prod
          DEBUG: 'True'
          ALLOWED_HOSTS: localhost
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py check

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret-key-not-used-in-prod
          DEBUG: 'True'
          ALLOWED_HOSTS: localhost
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=apps --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ─────────────────────────── JavaScript ───────────────────────
  javascript:
    name: JavaScript — lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint — ESLint
        run: npx eslint static/js/ tests/js/

      - name: Run Jest tests
        run: npm test
