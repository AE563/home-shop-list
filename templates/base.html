<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Список покупок{% endblock %}</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>

{% if user.is_authenticated %}
<header class="navbar navbar-light bg-white border-bottom shadow-sm fixed-top px-3 py-0" style="height:60px;">
    <div class="d-flex w-100 align-items-center justify-content-between gap-2">

        <div class="btn-group btn-group-sm" role="group" aria-label="Режим">
            <a href="{% url 'shop:view' %}"
               class="btn {% if request.resolver_match.url_name == 'view' %}btn-primary{% else %}btn-outline-primary{% endif %}">
                <i class="bi bi-eye me-1"></i>Просмотр
            </a>
            <a href="{% url 'shop:edit' %}"
               class="btn {% if request.resolver_match.url_name == 'edit' %}btn-primary{% else %}btn-outline-primary{% endif %}">
                <i class="bi bi-pencil me-1"></i>Правка
            </a>
        </div>

        <div class="d-flex align-items-center gap-2">
            <button id="btn-toggle-all" class="btn btn-sm btn-outline-secondary">
                Свернуть всё
            </button>
            <a href="{% url 'users:logout' %}" class="btn btn-sm btn-link text-muted p-0 px-1">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>

    </div>
</header>
<div class="navbar-spacer"></div>
{% endif %}

<main class="container-fluid px-2 py-2">
    {% block content %}{% endblock %}
</main>

<div id="offline-banner"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmDlOlmRBf5XMD0//LdX2nHfzfmf4"
        crossorigin="anonymous"></script>
{% load static %}
<script src="{% static 'js/utils.js' %}"></script>
<script src="{% static 'js/ui.js' %}"></script>
<script src="{% static 'js/websocket.js' %}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
